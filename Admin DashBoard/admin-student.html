<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Students | JobNexis Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      display: flex;
      min-height: 100vh;
      background-color: #f5f9ff;
      color: #333;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 230px;
      background-color: #0a3d62;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #60a5fa;
      font-size: 20px;
    }

    .menu-list { list-style: none; padding: 0; margin: 0; }
    .menu-list li { margin: 6px 0; }

    .menu-list li a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 12px 14px;
      border-radius: 8px;
      transition: 0.3s;
      font-weight: 500;
    }

    .menu-list li a:hover,
    .menu-list li a.active {
      background-color: #1e56a0;
      color: #fff;
    }

    .logout-btn {
      background-color: #1e56a0;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background-color: #154c8a;
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      background-color: #1e56a0;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover { background-color: #154c8a; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #1e56a0;
      color: white;
    }

    td img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .verified-label {
      background-color: #16a34a;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .filter-row select,
    .filter-row input[type="text"] {
      border: 1px solid #1e56a0;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      color: #333;
      transition: 0.3s;
      height: 40px;
    }

    .filter-row select:focus,
    .filter-row input[type="text"]:focus {
      outline: none;
      border-color: #154c8a;
      box-shadow: 0 0 5px rgba(30,86,160,0.3);
    }

    .batch-cards {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }

    .batch-card {
      flex: 1;
      background: white;
      border-radius: 10px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      padding: 20px;
      text-align: center;
    }

    .batch-card h4 {
      color: #1e56a0;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .batch-card p {
      font-size: 22px;
      font-weight: 600;
      color: #333;
    }

    .modal, .confirm-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-content, .confirm-box {
      background: white;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      width: 380px;
      text-align: center;
    }

    .confirm-box p { margin-bottom: 15px; font-size: 16px; color: #1e56a0; }
    .confirm-btns { display: flex; justify-content: space-around; }

    .modal-content input,
    .modal-content select {
      width: 100%;
      margin-bottom: 15px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1.5px solid #ccc;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
      background-color: #fafcff;
    }

    .modal-content input:focus,
    .modal-content select:focus {
      border-color: #1e56a0;
      box-shadow: 0 0 6px rgba(30,86,160,0.3);
      background-color: #fff;
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <h2>Admin Panel</h2>
      <ul class="menu-list">
        <li><a href="admin-dashboard.html">Dashboard</a></li>
        <li><a href="admin-student.html" class="active">Students</a></li>
        <li><a href="admin-recruiter.html">Recruiters</a></li>
        <li><a href="admin-reports.html">Reports</a></li>
        <li><a href="admin-profile.html">Admin Profile</a></li>
      </ul>
    </div>
    <button class="logout-btn" onclick="openLogoutConfirm()">Logout</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="page-header">
      <h2>Manage Students</h2>
      <button class="btn" id="addBatchBtn">+ Add Batch</button>
    </div>

    <div class="batch-cards">
      <div class="batch-card">
        <h4>Total Registered Students</h4>
        <p id="registeredCount">0</p>
      </div>
      <div class="batch-card">
        <h4>Total Verified Students</h4>
        <p id="verifiedCount">0</p>
      </div>
    </div>

    <div class="filter-row">
      <select id="filterBatchYear">
        <option value="">All Batch Years</option>
        <option value="2023">2023</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
      </select>

      <select id="filterBranch">
        <option value="">All Branches</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="MECH">MECH</option>
        <option value="CIVIL">CIVIL</option>
      </select>

      <input type="text" id="searchInput" placeholder="Search by Name or Regd No" />

      <div style="margin-left:auto;">
        <button class="btn">📥 Upload Data</button>
        <button class="btn">📤 Export Data</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Regd No</th>
          <th>Batch Year</th>
          <th>Branch</th>
          <th>Email</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="studentBody"></tbody>
    </table>
  </div>

  <!-- ADD BATCH MODAL -->
  <div class="modal" id="batchModal">
    <div class="modal-content">
      <h3>Add New Batch</h3>
      <input type="text" id="batchYearInput" placeholder="Enter Batch Year (e.g. 2025)" />
      <select id="batchBranchSelect">
        <option value="">Select Branch</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="MECH">MECH</option>
        <option value="CIVIL">CIVIL</option>
      </select>
      <div class="confirm-btns">
        <button class="btn" id="saveBatch">Save</button>
        <button class="btn" style="background:#dc2626;" id="cancelBatch">Cancel</button>
      </div>
    </div>
  </div>

  <!-- LOGOUT MODAL -->
  <div class="confirm-modal" id="logoutModal">
    <div class="confirm-box">
      <p>Are you sure you want to logout?</p>
      <div class="confirm-btns">
        <button class="btn" onclick="confirmLogout()">Yes</button>
        <button class="btn" style="background:#dc2626;" onclick="closeLogoutConfirm()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // === Student Table Demo Data ===
    const students = [
      {img:"https://via.placeholder.com/45", name:"Arjun Mehta", regd:"ST101", batch:"2023", branch:"CSE", email:"arjun@gmail.com", verified:false},
      {img:"https://via.placeholder.com/45", name:"Priya Sharma", regd:"ST102", batch:"2023", branch:"ECE", email:"priya@gmail.com", verified:true},
      {img:"https://via.placeholder.com/45", name:"Rahul Verma", regd:"ST103", batch:"2024", branch:"MECH", email:"rahul@gmail.com", verified:false},
      {img:"https://via.placeholder.com/45", name:"Sneha Das", regd:"ST104", batch:"2025", branch:"CIVIL", email:"sneha@gmail.com", verified:true}
    ];

    const studentBody = document.getElementById("studentBody");
    const regCount = document.getElementById("registeredCount");
    const verCount = document.getElementById("verifiedCount");

    function updateCounts() {
      regCount.textContent = students.length;
      verCount.textContent = students.filter(s => s.verified).length;
    }

    function renderStudents() {
      studentBody.innerHTML = "";
      const search = document.getElementById("searchInput").value.toLowerCase();
      const year = document.getElementById("filterBatchYear").value;
      const branch = document.getElementById("filterBranch").value;

      students.forEach((s, i) => {
        if (
          (year === "" || s.batch === year) &&
          (branch === "" || s.branch === branch) &&
          (s.name.toLowerCase().includes(search) || s.regd.toLowerCase().includes(search))
        ) {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td><img src="${s.img}" alt="Student"></td>
            <td>${s.name}</td>
            <td>${s.regd}</td>
            <td>${s.batch}</td>
            <td>${s.branch}</td>
            <td>${s.email}</td>
            <td>
              <button class="btn">View Profile</button>
              ${
                s.verified
                  ? `<span class="verified-label">Verified</span>
                     <button class="btn" style="background:#dc2626;" onclick="deleteStudent(${i})">Delete</button>`
                  : `<button class="btn" onclick="verifyStudent(${i})">Verify</button>
                     <button class="btn" style="background:#dc2626;" onclick="rejectStudent(${i})">Reject</button>`
              }
            </td>`;
          studentBody.appendChild(row);
        }
      });
      updateCounts();
    }

    function verifyStudent(i){ students[i].verified = true; renderStudents(); }
    function deleteStudent(i){ students.splice(i,1); renderStudents(); }
    function rejectStudent(i){ students.splice(i,1); renderStudents(); }

    // === Logout Modal ===
    const logoutModal = document.getElementById("logoutModal");
    function openLogoutConfirm(){ logoutModal.style.display = "flex"; }
    function closeLogoutConfirm(){ logoutModal.style.display = "none"; }
    function confirmLogout(){
      logoutModal.style.display = "none";
      window.location.href = "login.html"; // Change path to your login page
    }

    // === Add Batch Modal ===
    const batchModal = document.getElementById("batchModal");
    document.getElementById("addBatchBtn").onclick = () => batchModal.style.display = "flex";
    document.getElementById("cancelBatch").onclick = () => batchModal.style.display = "none";
    document.getElementById("saveBatch").onclick = () => {
      const year = document.getElementById("batchYearInput").value.trim();
      const branch = document.getElementById("batchBranchSelect").value;
      if(year && branch){ alert(`Batch Added: ${year} - ${branch}`); batchModal.style.display = "none"; }
      else alert("Please fill both fields!");
    };

    // === Auto Highlight Active Page ===
    const currentPage = window.location.pathname.split("/").pop();
    document.querySelectorAll(".menu-list a").forEach(link => {
      if(link.getAttribute("href") === currentPage){ link.classList.add("active"); }
    });

    renderStudents();
  </script>
</body>
</html>
