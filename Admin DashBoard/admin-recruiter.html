<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruiters | JobNexis Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      display: flex;
      min-height: 100vh;
      background-color: #f5f9ff;
      color: #333;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 230px;
      background-color: #0a3d62;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px 10px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #60a5fa;
      font-size: 20px;
    }

    .sidebar ul { list-style: none; padding: 0; margin: 0; }
    .sidebar ul li { margin: 6px 0; }

    .sidebar ul li a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 12px 14px;
      border-radius: 8px;
      transition: 0.3s;
      font-weight: 500;
    }

    .sidebar ul li a:hover,
    .sidebar ul li a.active {
      background-color: #1e56a0;
      color: #fff;
    }

    .logout-btn {
      background-color: #1e56a0;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background-color: #154c8a;
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
    }

    .btn {
      background-color: #1e56a0;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 600;
    }

    .btn:hover { background-color: #154c8a; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #1e56a0;
      color: white;
    }

    .actions button { margin-right: 6px; }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .controls input[type="text"] {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      min-width: 220px;
    }

    .muted { color:#666; font-size:13px; }

    .modal, .delete-confirm, .logout-confirm, .success-popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content, .delete-box, .logout-box, .success-box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 400px;
      max-width: 95%;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
      text-align: center;
    }

    .modal-content h3 {
      color: #1e56a0;
      margin-bottom: 15px;
    }

    .modal-content input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .modal-actions { text-align: right; }
    .small { font-size: 13px; padding: 6px 8px; }

  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <h2>Admin Panel</h2>
      <ul>
        <li><a href="admin-dashboard.html">Dashboard</a></li>
        <li><a href="admin-student.html">Students</a></li>
        <li><a href="admin-recruiter.html" class="active">Recruiters</a></li>
        <li><a href="admin-reports.html">Reports</a></li>
        <li><a href="admin-profile.html">Admin Profile</a></li>
      </ul>
    </div>
    <button class="logout-btn" onclick="openLogoutConfirm()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h2>Recruiters</h2>

    <div class="controls">
      <input type="text" id="searchRecruiter" placeholder="Search by company, recruiter or email..." />
      <button class="btn" id="addRecruiterBtn">+ Add Recruiter</button>
      <button class="btn" id="downloadCsvBtn">Download CSV</button>
      <span class="muted" id="recruiterCountDisplay"></span>
    </div>

    <table id="recruiterTable">
      <thead>
        <tr>
          <th>Company & Recruiter Name</th>
          <th>Email</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- ADD RECRUITER MODAL -->
  <div class="modal" id="recruiterModal">
    <div class="modal-content">
      <h3>Add Recruiter</h3>
      <input type="text" id="recruiterName" placeholder="Recruiter Name" />
      <input type="text" id="companyName" placeholder="Company Name" />
      <input type="email" id="companyEmail" placeholder="Email (Login ID)" />
      <input type="password" id="companyPassword" placeholder="Password" />
      <div class="modal-actions">
        <button class="btn" id="saveRecruiterBtn">Save</button>
        <button class="btn" id="cancelRecruiterBtn" style="background:#dc2626;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM -->
  <div class="delete-confirm" id="deleteConfirmBox">
    <div class="delete-box">
      <h4 id="deleteConfirmText">Are you sure you want to delete this recruiter?</h4>
      <div style="margin-top:12px;">
        <button class="btn" id="confirmDeleteBtn" style="background:#dc2626;">Confirm Delete</button>
        <button class="btn" id="cancelDeleteBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- LOGOUT CONFIRM -->
  <div class="logout-confirm" id="logoutConfirm">
    <div class="logout-box">
      <h4>Are you sure you want to logout?</h4>
      <div style="margin-top:12px;">
        <button class="btn" onclick="confirmLogout()">Yes</button>
        <button class="btn" style="background:#dc2626;" onclick="closeLogoutConfirm()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const recruiterTableBody = document.querySelector('#recruiterTable tbody');
    const searchInput = document.getElementById('searchRecruiter');
    const addRecruiterBtn = document.getElementById('addRecruiterBtn');
    const downloadCsvBtn = document.getElementById('downloadCsvBtn');
    const recruiterCountDisplay = document.getElementById('recruiterCountDisplay');
    const recruiterModal = document.getElementById('recruiterModal');
    const saveRecruiterBtn = document.getElementById('saveRecruiterBtn');
    const cancelRecruiterBtn = document.getElementById('cancelRecruiterBtn');
    const deleteConfirmBox = document.getElementById('deleteConfirmBox');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
    const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');

    let recruiters = [
      { id: 1, recruiterName: "Rajesh Kumar", company: "TechNova Pvt Ltd", email: "hr@technova.com" },
      { id: 2, recruiterName: "Sonia Verma", company: "Innova Solutions", email: "sonia@innova.com" },
      { id: 3, recruiterName: "Rohit Singh", company: "Alpha Systems", email: "rohit@alpha.com" }
    ];
    let nextId = 4;
    let recruiterToDelete = null;

    function renderRecruiterTable() {
      const q = searchInput.value.toLowerCase().trim();
      recruiterTableBody.innerHTML = '';
      const filtered = recruiters.filter(r =>
        r.company.toLowerCase().includes(q) ||
        r.recruiterName.toLowerCase().includes(q) ||
        r.email.toLowerCase().includes(q)
      );

      filtered.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.company} — ${r.recruiterName}</td>
          <td>${r.email}</td>
          <td>
            <button class="small btn" data-action="delete" data-id="${r.id}" style="background:#dc2626;">Delete</button>
          </td>`;
        recruiterTableBody.appendChild(tr);
      });
      recruiterCountDisplay.textContent = `${filtered.length} shown • ${recruiters.length} total`;
    }

    addRecruiterBtn.onclick = ()=> recruiterModal.style.display='flex';
    cancelRecruiterBtn.onclick = ()=> recruiterModal.style.display='none';
    saveRecruiterBtn.onclick = ()=>{
      const name = document.getElementById('recruiterName').value.trim();
      const company = document.getElementById('companyName').value.trim();
      const email = document.getElementById('companyEmail').value.trim();
      const pass = document.getElementById('companyPassword').value.trim();
      if(!name||!company||!email||!pass) return alert('Please fill all fields');
      recruiters.push({ id: nextId++, recruiterName:name, company, email });
      recruiterModal.style.display='none';
      renderRecruiterTable();
    };

    recruiterTableBody.onclick = e=>{
      const btn=e.target.closest('button'); if(!btn)return;
      const id=+btn.dataset.id;
      recruiterToDelete=id;
      document.getElementById('deleteConfirmText').textContent=`Delete recruiter ID ${id}?`;
      deleteConfirmBox.style.display='flex';
    };

    confirmDeleteBtn.onclick=()=>{
      recruiters=recruiters.filter(r=>r.id!==recruiterToDelete);
      deleteConfirmBox.style.display='none';
      renderRecruiterTable();
    };
    cancelDeleteBtn.onclick=()=>deleteConfirmBox.style.display='none';

    // Logout Confirmation
    const logoutConfirm=document.getElementById("logoutConfirm");
    function openLogoutConfirm(){ logoutConfirm.style.display="flex"; }
    function closeLogoutConfirm(){ logoutConfirm.style.display="none"; }
    function confirmLogout(){
      logoutConfirm.style.display="none";
      window.location.href="login.html";
    }

    // Auto Highlight Active Link
    const currentPage=window.location.pathname.split("/").pop();
    document.querySelectorAll(".sidebar a").forEach(link=>{
      if(link.getAttribute("href")===currentPage){ link.classList.add("active"); }
    });

    searchInput.oninput=renderRecruiterTable;
    renderRecruiterTable();
  </script>
</body>
</html>
