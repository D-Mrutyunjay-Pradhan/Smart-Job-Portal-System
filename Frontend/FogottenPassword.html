<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - JobNexis</title>
  <style>

   * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: aliceblue;
  color: #333;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background:#253a58;
  padding: 10px 20px;
  border-bottom: 1px solid #ddd;
}

.nav-left {
  display: flex;
  align-items: center;
}

.logo {
  width: 55px;
  height: 55px;
  margin-right: 10px;
}

.nav-title h3 {
  font-size: 30px;
  font-weight: bold;
  color: white;
}

.nav-title p {
  font-size: 8px;
  color: whitesmoke;
}

    /* ===== CARD STYLING ===== */
    .forgot-card {
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.1);
      width: 420px;
      text-align: center;
      margin-left: auto;
      margin-right: auto;
      margin-top: 80px; /* space below top bar */
    }

    .forgot-card h2 {
      margin-bottom: 20px;
      color: #0a3d62;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #1e56a0;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus {
      border-color: #1e56a0;
      box-shadow: 0 0 3px rgba(30, 86, 160, 0.4);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #1e56a0;
      border: none;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 20px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #154c8a;
    }

    .hidden {
      display: none;
    }

    .links {
      margin-top: 10px;
      font-size: 14px;
    }

    .links a {
      color: #1e56a0;
      text-decoration: none;
      font-weight: 500;
    }

    .links a:hover {
      color: #154c8a;
      text-decoration: underline;
    }
  </style>
</head>
<body>
 <!-- Navbar -->
  <header class="navbar">
    <div class="nav-left">
    <img src="logo.png" alt="logo" class="logo">
      <div class="nav-title">
        <h3>JobNexis</h3>
        <p>Training & Placement</p>
      </div>
    </div>
  </header>
  

  <!-- ===== FORGOT PASSWORD CARD ===== -->
  <div class="forgot-card">
    <h2>Forgot Password</h2>
    <form id="forgotForm">
      <!-- Step 1: Email -->
      <div class="form-group">
        <label for="email">Registered Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>
      <button type="button" class="btn" onclick="sendOTP()">Send OTP</button>

      <!-- Step 2: OTP -->
      <div class="form-group">
        <label for="otp">OTP</label>
        <input type="text" id="otp" placeholder="Enter OTP">
      </div>
      <button type="button" class="btn" onclick="confirmOTP()">Confirm OTP</button>

      <!-- Step 3: New Password (hidden initially) -->
      <div id="passwordSection" class="hidden">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password">
        </div>
        <button type="submit" class="btn">Reset Password</button>
      </div>
    </form>

    <div class="links">
      <a href="Login.html">Back to Login</a>
    </div>
  </div>

  <script>
    function sendOTP() {
      const email = document.getElementById("email").value;
      if (email) {
        alert("OTP has been sent to " + email);
        // TODO: Call backend API to send OTP via Gmail
      } else {
        alert("Please enter your registered email!");
      }
    }

    function confirmOTP() {
      const otp = document.getElementById("otp").value;
      if (otp) {
        alert("OTP confirmed!");
        // TODO: Verify OTP with backend
        document.getElementById("passwordSection").classList.remove("hidden");
      } else {
        alert("Please enter OTP!");
      }
    }

    document.getElementById("forgotForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const newPass = document.getElementById("newPassword").value;
      const confirmPass = document.getElementById("confirmPassword").value;

      if (!newPass || !confirmPass) {
        alert("Please enter both password fields!");
        return;
      }
      if (newPass !== confirmPass) {
        alert("Passwords do not match!");
        return;
      }
      alert("Password reset successful!");
      // TODO: Send new password to backend
      window.location.href = "Login.html"; // Redirect to login page
    });
  </script>
</body>
</html>
